name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore

    # -------------------------------
    # Docker Login
    # -------------------------------
    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    # -------------------------------
    # Build OrderService Image
    # -------------------------------
    - name: Build OrderService Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/smartordersystem-orderservice ./ -f OrderService/Dockerfile

    - name: Push OrderService Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/smartordersystem-orderservice

    # -------------------------------
    # Build PaymentService Image
    # -------------------------------
    - name: Build PaymentService Image
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/smartordersystem-paymentservice ./ -f PaymentService/Dockerfile

    - name: Push PaymentService Image
      run: |
        docker push ${{ secrets.DOCKER_USERNAME }}/smartordersystem-paymentservice
